<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6ndzR13/image-54df40.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Tab Active State */
        .tab-active { 
            border-bottom: 3px solid #F97316; 
            color: #F97316 !important; 
            font-weight: 800; 
            background-color: #fff; 
        }

        /* Focus State for Editable Fields */
        [contenteditable="true"]:focus { 
            outline: 2px solid #F97316; 
            background-color: #FFF7ED; 
            padding: 2px 4px; 
            border-radius: 4px; 
        }

        /* Print/PDF Specific Overrides */
        @media print {
            .no-print { display: none !important; }
            .tab-content { display: block !important; opacity: 1 !important; visibility: visible !important; border: 1px solid #e2e8f0; margin-bottom: 20px; padding: 20px; page-break-inside: avoid; }
            body { background: white !important; }
            main { overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-gray-800" onload="initInterface()">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col no-print">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="text-xl font-extrabold tracking-tighter leading-none">
                <span class="block text-slate-400 text-[10px] tracking-[0.3em] mb-2 uppercase">Training Interface</span>
                <span class="block">LEGAL</span>
                <span class="block text-orange-500">SUPPORT</span>
                <span class="block">HELP</span>
            </h1>
        </div>
        <nav class="mt-10 px-6 space-y-4">
            <button onclick="generatePDF()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg text-xs font-bold uppercase tracking-widest shadow-lg transition-all active:scale-95">Download PDF</button>
            <button onclick="resetInterface()" class="w-full border border-slate-700 hover:bg-slate-800 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Clear All</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-12 bg-white border-b border-gray-200 no-print flex items-center justify-end px-8">
            <div id="save-status" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest opacity-0 transition-opacity">Interface Synced</div>
        </header>

        <div class="p-8 overflow-y-auto flex-1" id="capture-area" oninput="triggerAutoSave()">
            
            <div class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight flex items-center gap-3">
                            <span contenteditable="true" class="hover:bg-slate-50 px-1 rounded">Client Name</span>
                            <span class="text-slate-300 font-thin">/</span>
                            <span contenteditable="true" class="text-slate-600 hover:bg-slate-50 px-1 rounded">Trainee Name</span>
                        </h1>
                        <div class="mt-4 flex items-center gap-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Interface ID:</span>
                            <span contenteditable="true" class="text-xs font-mono font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full border border-orange-100">BATCH-2026</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <select onchange="document.getElementById('currentStatus').innerText = this.value" class="no-print bg-slate-100 border-none rounded px-3 py-1.5 text-[10px] font-bold uppercase text-slate-600 mb-2">
                            <option value="Intake">Intake</option>
                            <option value="Investigation">Investigation</option>
                            <option value="Demand">Demand</option>
                            <option value="Closed">Closed</option>
                        </select>
                        <div id="currentStatus" class="text-orange-600 font-black text-2xl uppercase italic tracking-tighter">Intake</div>
                    </div>
                </div>
            </div>

            <div class="flex gap-1 mb-8 no-print border-b border-slate-200">
                <button onclick="switchTab('client')" id="btn-client" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all tab-active">Profile</button>
                <button onclick="switchTab('facts')" id="btn-facts" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Facts</button>
                <button onclick="switchTab('medical')" id="btn-medical" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Medical</button>
                <button onclick="switchTab('insurance')" id="btn-insurance" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Insurance</button>
            </div>

            <div id="tab-client" class="tab-pane grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Client Identity</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[9px] font-bold text-slate-400 uppercase">DOB</label><div contenteditable="true" class="text-sm font-semibold border-b">...</div></div>
                            <div><label class="text-[9px] font-bold text-slate-400 uppercase">SSN</label><div contenteditable="true" class="text-sm font-semibold border-b">...</div></div>
                        </div>
                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Phone</label><div contenteditable="true" class="text-sm font-semibold border-b">...</div></div>
                        <div class="no-print mt-4">
                            <label class="text-[9px] font-bold text-slate-400 uppercase block mb-1">ID Upload</label>
                            <input type="file" id="id-file" class="hidden" onchange="updateFileLabel(this)">
                            <button onclick="document.getElementById('id-file').click()" class="text-[10px] bg-slate-100 px-3 py-1 rounded font-bold">Choose File</button>
                            <span id="file-name" class="text-[10px] ml-2 italic text-slate-500">None</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-facts" class="tab-pane hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Case Narrative</h3>
                    <div contenteditable="true" class="text-sm min-h-[300px] italic text-slate-600 outline-none">Start typing case facts...</div>
                </div>
            </div>

            <div id="tab-medical" class="tab-pane hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Treatment Log</h3>
                    <div contenteditable="true" class="text-sm min-h-[200px] outline-none">Enter medical details...</div>
                </div>
            </div>

            <div id="tab-insurance" class="tab-pane hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Coverage</h3>
                    <div contenteditable="true" class="text-sm min-h-[100px] outline-none">Enter insurance info...</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let currentTab = 'client';

        function initInterface() {
            switchTab('client');
        }

        function switchTab(tabId) {
            currentTab = tabId;
            // Handle Panels
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.add('hidden');
            });
            const targetPane = document.getElementById('tab-' + tabId);
            if(targetPane) targetPane.classList.remove('hidden');

            // Handle Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
            });
            const targetBtn = document.getElementById('btn-' + tabId);
            if(targetBtn) targetBtn.classList.add('tab-active');
        }

        function updateFileLabel(input) {
            const label = document.getElementById('file-name');
            if(input.files && input.files[0]) {
                label.innerText = "📎 " + input.files[0].name;
                label.classList.add('text-orange-600', 'not-italic', 'font-bold');
            }
        }

        function triggerAutoSave() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 800);
        }

        async function generatePDF() {
            const element = document.getElementById('capture-area');
            const panes = document.querySelectorAll('.tab-pane');
            const originalTab = currentTab;

            // 1. Force all panes to be visible for the PDF engine
            panes.forEach(p => p.style.display = 'block');
            panes.forEach(p => p.classList.remove('hidden'));

            const opt = {
                margin: [0.5, 0.5],
                filename: 'LSH_Training_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                console.error("PDF generation failed:", error);
                alert("Error generating PDF. Check console.");
            } finally {
                // 2. Cleanup: Reset visibility and return to the tab the user was on
                panes.forEach(p => p.style.display = '');
                switchTab(originalTab);
            }
        }

        function resetInterface() {
            if(confirm("Permanently clear all data?")) location.reload();
        }
    </script>
</body>
</html>
