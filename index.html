<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Case Management Portal</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6ndzR13/image-54df40.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-custom-orange { background-color: #F97316; }
        .tab-active { border-bottom: 3px solid #F97316; color: #F97316; font-weight: 700; }
        /* Light Gray Workspace Background */
        .workspace-bg { background-color: #F3F4F6; }
        [contenteditable="true"]:focus { outline: 2px solid #F97316; background-color: #FFF7ED; padding: 4px; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white min-h-screen flex text-gray-800">

    <aside class="w-64 bg-slate-800 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 border-b border-slate-700 flex flex-col items-center">
            <div class="w-full bg-slate-900 rounded-lg p-4 border border-slate-700">
                 <img src="https://i.ibb.co/6ndzR13/image-54df40.png" alt="LSH Logo" class="w-full h-auto">
            </div>
        </div>
        <nav class="mt-6 px-4 space-y-1 flex-1">
            <div class="py-2.5 px-4 rounded bg-slate-700 border-l-4 border-custom-orange text-sm font-semibold uppercase tracking-widest">Workspace</div>
            <button onclick="saveCase()" class="w-full mt-8 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg text-xs font-bold uppercase shadow-xl transition-all">Download PDF</button>
        </nav>
        <div class="p-4 border-t border-slate-700 text-[9px] text-slate-500 text-center uppercase tracking-widest font-bold">LSH Secure Network</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden workspace-bg" id="capture-area">
        <header class="h-32 bg-cover bg-center border-b border-gray-200 relative" style="background-image: url('https://i.ibb.co/3sX8M8H/image-0.png');">
            <div class="absolute top-4 right-8 flex flex-col items-end">
                <label class="text-[9px] font-bold text-white uppercase tracking-widest mb-1 drop-shadow-md">Current Case Phase</label>
                <select onchange="updatePhase(this.value)" class="bg-slate-900/80 backdrop-blur-md text-white border border-white/30 rounded px-3 py-1.5 text-xs font-bold uppercase tracking-wider focus:ring-2 focus:ring-orange-500 outline-none cursor-pointer shadow-lg">
                    <option value="Intake">Intake</option>
                    <option value="Investigation">Investigation</option>
                    <option value="Treatment">Treatment</option>
                    <option value="Demand Review">Demand Review</option>
                    <option value="Demand">Demand</option>
                    <option value="Settlement Negotiations">Settlement Neg.</option>
                    <option value="Settlement">Settlement</option>
                    <option value="Litigation">Litigation</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </header>

        <div class="p-6 overflow-y-auto flex-1">
            <div class="mb-6 border-b pb-4 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800" contenteditable="true">Untitled Case File</h1>
                    <p class="text-sm text-gray-500">Branch: <span class="text-slate-700 font-semibold">Las Vegas, Nevada</span> | ID:
