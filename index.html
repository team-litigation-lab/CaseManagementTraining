<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Assessment Portal</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6ndzR13/image-54df40.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-custom-orange { background-color: #F97316; }
        .tab-active { border-bottom: 3px solid #F97316; color: #F97316; font-weight: 700; }
        .workspace-bg { background-color: #F3F4F6; }
        [contenteditable="true"]:focus { outline: 2px solid #F97316; background-color: #FFF7ED; padding: 4px; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #save-status { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-white min-h-screen flex text-gray-800" onload="loadWork()">

    <aside class="w-64 bg-slate-800 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-8 border-b border-slate-700 flex flex-col items-center justify-center">
            <h1 class="text-xl font-extrabold tracking-tighter leading-none text-center">
                <span class="block text-white">LEGAL</span>
                <span class="block text-custom-orange">SUPPORT</span>
                <span class="block text-white">HELP</span>
            </h1>
            <div class="mt-2 h-1 w-12 bg-custom-orange rounded-full"></div>
        </div>
        <nav class="mt-6 px-4 space-y-1 flex-1">
            <div class="py-2.5 px-4 rounded bg-slate-700 border-l-4 border-custom-orange text-sm font-semibold uppercase tracking-widest text-orange-400">Training Module</div>
            <button onclick="saveCase()" class="w-full mt-8 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg text-xs font-bold uppercase shadow-xl transition-all">Download Assessment PDF</button>
            <button onclick="resetForm()" class="w-full mt-4 border border-slate-600 hover:bg-slate-700 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Clear Progress</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden workspace-bg" id="capture-area">
        <header class="h-32 bg-cover bg-center border-b border-gray-200 relative" style="background-image: url('https://i.ibb.co/3sX8M8H/image-0.png');">
            <div class="absolute top-4 right-8 flex flex-col items-end">
                <select id="phase-select" onchange="updatePhase(this.value); autoSave();" class="bg-slate-900/80 backdrop-blur-md text-white border border-white/30 rounded px-3 py-1.5 text-xs font-bold uppercase tracking-wider outline-none cursor-pointer">
                    <option value="Intake">Intake</option>
                    <option value="Investigation">Investigation</option>
                    <option value="Treatment">Treatment</option>
                    <option value="Demand Review">Demand Review</option>
                    <option value="Demand">Demand</option>
                    <option value="Settlement Negotiations">Settlement Neg.</option>
                    <option value="Settlement">Settlement</option>
                    <option value="Litigation">Litigation</option>
                    <option value="Closed">Closed</option>
                </select>
                <div id="save-status" class="mt-2 text-[8px] text-white/50 uppercase font-bold tracking-widest opacity-0">Progress Autosaved</div>
            </div>
        </header>

        <div class="p-6 overflow-y-auto flex-1" oninput="autoSave()">
            <div class="mb-6 border-b pb-4 flex justify-between items-center">
                <div>
                    <h1 id="case-title" class="text-2xl font-bold text-slate-800" contenteditable="true">Untitled Assessment</h1>
                    <p class="text-sm text-gray-500">Branch: <span class="text-slate-700 font-semibold">Las Vegas, Nevada</span></p>
                </div>
                <div class="text-right">
                    <span id="currentStatus" class="text-orange-600 font-black text-lg uppercase">Intake</span>
                </div>
            </div>

            <div class="flex border-b mb-6 bg-white rounded-t-xl overflow-x-auto scrollbar-hide shadow-sm">
                <button onclick="showTab('client')" id="btn-client" class="px-8 py-4 text-xs font-bold uppercase tracking-widest text-gray-400 tab-active">Client Profile</button>
                <button onclick="showTab('details')" id="btn-details" class="px-8 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Case Facts</button>
                <button onclick="showTab('damage')" id="btn-damage" class="px-8 py-4 text-xs font-bold uppercase tracking-widest text-gray-400">Property</button>
                <button onclick="showTab('insurance')" id="btn-insurance" class="px-8 py-
