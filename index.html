<div id="pane-tasks" class="tab-pane">
     <div class="pdf-card border-l-8 border-orange-500">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
            <h3 class="text-[11px] font-black uppercase text-orange-500">Action Items</h3>
            <button onclick="addTaskRow()" class="no-print bg-slate-900 text-white text-[10px] px-3 py-1 rounded-md font-bold uppercase">+ Add Task</button>
        </div>
        <table class="treat-table">
            <thead>
                <tr>
                    <th style="width: 35%;">Task Description</th>
                    <th style="width: 20%;">Assigned To</th>
                    <th>Priority</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th class="no-print"></th>
                </tr>
            </thead>
            <tbody id="tasks-body">
                <tr>
                    <td><div contenteditable="true" class="w-full">Order initial medical records</div></td>
                    <td><div contenteditable="true" class="w-full font-semibold text-slate-700">Case Manager</div></td>
                    <td><select class="prof-input text-[11px]"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></td>
                    <td><div contenteditable="true">MM/DD/YYYY</div></td>
                    <td><select class="prof-input text-[11px]"><option>Pending</option><option>In Progress</option><option>Completed</option></select></td>
                    <td class="no-print"><button onclick="this.parentElement.parentElement.remove()" class="text-slate-300">×</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Updated JavaScript Function
    function addTaskRow() {
        const body = document.getElementById('tasks-body');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><div contenteditable="true" class="w-full">New task...</div></td>
            <td><div contenteditable="true" class="w-full font-semibold text-slate-700">Name/Role</div></td>
            <td><select class="prof-input text-[11px]"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></td>
            <td><div contenteditable="true">MM/DD/YYYY</div></td>
            <td><select class="prof-input text-[11px]"><option>Pending</option><option>In Progress</option><option>Completed</option></select></td>
            <td class="no-print"><button onclick="this.parentElement.parentElement.remove()" class="text-slate-300">×</button></td>`;
        body.appendChild(row);
    }
</script>
