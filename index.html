<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 16px; } 
        .tab-btn { border-bottom: 3px solid transparent; cursor: pointer; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 11px; padding-bottom: 8px; transition: all 0.3s; white-space: nowrap; }
        .active-tab { border-bottom: 3px solid #f97316 !important; color: #f97316 !important; }
        .pdf-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        [contenteditable="true"] { outline: none; border: 1px solid #f1f5f9; background: #f8fafc; border-radius: 4px; padding: 4px 8px; min-width: 40px; display: inline-block; }
        [contenteditable="true"]:focus { background: #ffffff; border-color: #f97316; }
        label { font-size: 11px !important; margin-bottom: 4px; display: block; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-950 text-white flex flex-col no-print">
        <div class="p-8 border-b border-slate-900">
            <h1 class="text-lg font-black text-white leading-tight uppercase tracking-tight">
                Legal Support Help<br><span class="text-orange-500">Training Interface</span>
            </h1>
        </div>
        <div class="p-6 space-y-4">
            <button onclick="downloadPDF()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg font-bold text-xs uppercase shadow-lg transition-all">Download PDF</button>
            <button onclick="window.location.reload()" class="w-full border border-slate-700 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-900 transition-all">Clear All Data</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-12 bg-white border-b flex items-center justify-end px-8 no-print">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Workspace Active</span>
        </header>

        <div class="flex-1 overflow-y-auto p-8" id="capture-area">
            
            <div class="pdf-card border-l-8 border-orange-500">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 uppercase">
                            <span contenteditable="true">Client Name</span> 
                            <span class="text-slate-300 mx-2">|</span> 
                            <span contenteditable="true" class="text-2xl text-slate-500">(000) 000-0000</span>
                        </h1>
                        <div class="mt-3 flex items-center gap-4">
                            <p class="text-sm font-bold text-orange-600 uppercase">Case ID: <span contenteditable="true">BATCH-2026-X</span></p>
                            <select onchange="updatePhase(this.value)" class="bg-orange-50 text-orange-700 text-[11px] font-bold uppercase px-2 py-1 rounded border border-orange-200 outline-none">
                                <option value="Intake">Intake</option>
                                <option value="Investigation">Investigation</option>
                                <option value="Treating">Treating</option>
                                <option value="Mediation">Mediation</option>
                                <option value="Arbitration">Arbitration</option>
                                <option value="Litigation">Litigation</option>
                                <option value="Disbursement">Disbursement</option>
                            </select>
                        </div>
                    </div>
                    <div id="display-phase" class="text-orange-600 font-black text-2xl uppercase italic tracking-tighter">Intake</div>
                </div>
            </div>

            <div id="tab-navigation" class="flex flex-wrap gap-5 border-b mb-6 no-print">
                <div id="btn-profile" onclick="showTab('profile')" class="tab-btn active-tab">Case Profile</div>
                <div id="btn-tasks" onclick="showTab('tasks')" class="tab-btn">Tasks</div>
                <div id="btn-notes" onclick="showTab('notes')" class="tab-btn">Notes</div>
            </div>

            <div id="pane-profile" class="tab-pane active">
                <div class="pdf-card">
                    <h3 class="text-[11px] font-bold uppercase text-slate-400 mb-4 border-b pb-2">Profile Information</h3>
                    <div contenteditable="true" class="text-sm w-full min-h-[100px]">General case details go here...</div>
                </div>
            </div>

            <div id="pane-tasks" class="tab-pane">
                <div class="pdf-card">
                    <h3 class="text-[11px] font-bold uppercase text-orange-500 mb-4 border-b pb-2">Active Tasks</h3>
                    <div contenteditable="true" class="text-sm w-full min-h-[200px] bg-slate-50 p-4">1. Review police report<br>2. Call client for update</div>
                </div>
            </div>

            <div id="pane-notes" class="tab-pane">
                <div class="pdf-card">
                    <h3 class="text-[11px] font-bold uppercase text-orange-500 mb-4 border-b pb-2">Case Notes</h3>
                    <div contenteditable="true" class="text-sm w-full min-h-[200px] bg-slate-50 p-4">Type notes here...</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('pane-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        function updatePhase(val) { document.getElementById('display-phase').innerText = val; }

        async function downloadPDF() {
            const element = document.getElementById('capture-area');
            html2pdf().from(element).save('Case_Report.pdf');
        }
    </script>
</body>
</html>
