<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-btn { border-bottom: 3px solid transparent; transition: all 0.2s; cursor: pointer; }
        .active-tab { border-bottom: 3px solid #F97316 !important; color: #F97316 !important; font-weight: 800; }
        .sub-tab-btn { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; }
        .sub-active { background-color: #F97316 !important; color: white !important; border-color: #F97316 !important; }
        [contenteditable="true"]:focus { outline: 2px solid #F97316; background-color: #FFF7ED; padding: 0 4px; border-radius: 2px; }
        .pdf-card { border: 1px solid #e2e8f0; border-radius: 0.75rem; background: white; padding: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex text-gray-800">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col no-print">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="text-xl font-extrabold tracking-tighter uppercase">Legal Support Help</h1>
        </div>
        <nav class="mt-10 px-6 space-y-4">
            <button onclick="generatePDF()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg text-xs font-bold uppercase tracking-widest shadow-lg">Download PDF</button>
            <button onclick="window.location.reload()" class="w-full border border-slate-700 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase">Reset</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-12 bg-white border-b border-gray-200 no-print flex items-center justify-end px-8">
            <div id="save-status" class="text-[9px] text-slate-400 uppercase font-bold opacity-0 transition-opacity">Saved</div>
        </header>

        <div class="p-8 overflow-y-auto flex-1" id="capture-area">
            
            <div class="mb-8 pdf-card border-l-4 border-l-orange-500">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-3xl font-black text-slate-900"><span contenteditable="true">Client Name</span></h1>
                        <div class="mt-2 text-xs font-mono font-bold text-orange-600 uppercase">Case: <span contenteditable="true">BATCH-2026-X</span></div>
                    </div>
                    <div id="currentStatus" class="text-orange-600 font-black text-2xl uppercase italic">Intake</div>
                </div>
            </div>

            <div class="flex gap-6 mb-8 no-print border-b">
                <button onclick="showMainTab('client')" id="btn-client" class="tab-btn pb-3 text-[11px] font-bold uppercase active-tab">Profile</button>
                <button onclick="showMainTab('facts')" id="btn-facts" class="tab-btn pb-3 text-[11px] font-bold uppercase text-slate-400">Case Facts</button>
                <button onclick="showMainTab('medical')" id="btn-medical" class="tab-btn pb-3 text-[11px] font-bold uppercase text-slate-400">Medical</button>
            </div>

            <div id="tab-client" class="main-tab grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="pdf-card">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 border-b pb-2">Client Identity</h3>
                    <div class="space-y-4">
                        <label class="block text-[9px] font-bold text-slate-400 uppercase">Home Address</label>
                        <div contenteditable="true" class="text-sm font-semibold border-b">...</div>
                        <div class="pt-4 border-t">
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Employed?</label>
                            <select class="ml-2 text-[10px] font-bold bg-slate-100 rounded">
                                <option>NO</option>
                                <option>YES</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="pdf-card">
                    <h3 class="text-[10px] font-black uppercase text-orange-500 mb-4 border-b pb-2">Emergency Contact</h3>
                    <div contenteditable="true" class="text-sm font-semibold min-h-[100px]">...</div>
                </div>
            </div>

            <div id="tab-facts" class="main-tab hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="pdf-card col-span-1">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 border-b pb-2">Claim Basics</h3>
                    <label class="text-[9px] font-bold text-slate-400 uppercase">Type of Claim</label>
                    <select class="w-full mt-1 bg-slate-50 border text-[11px] font-bold p-2 rounded">
                        <option>MVA</option>
                        <option>Mass Tort</option>
                        <option>Slip and Fall</option>
                        <option>Dog Bite</option>
                        <option>Others</option>
                    </select>
                </div>
                <div class="md:col-span-2 flex flex-col gap-4">
                    <div class="flex gap-2 no-print bg-slate-100 p-1 rounded-lg w-fit">
                        <button onclick="showSubTab('narrative')" id="sub-btn-narrative" class="sub-tab-btn px-4 py-1.5 rounded-md text-[10px] font-bold sub-active">Narrative</button>
                        <button onclick="showSubTab('injuries')" id="sub-btn-injuries" class="sub-tab-btn px-4 py-1.5 rounded-md text-[10px] font-bold bg-white">Injuries</button>
                        <button onclick="showSubTab('notes')" id="sub-btn-notes" class="sub-tab-btn px-4 py-1.5 rounded-md text-[10px] font-bold bg-white">Notes</button>
                    </div>
                    <div id="sub-narrative" class="sub-pane pdf-card min-h-[250px]"><div contenteditable="true" class="text-sm italic">Mechanics of incident...</div></div>
                    <div id="sub-injuries" class="sub-pane pdf-card hidden min-h-[250px]"><div contenteditable="true" class="text-sm font-semibold">List injuries...</div></div>
                    <div id="sub-notes" class="sub-pane pdf-card hidden min-h-[250px]"><div contenteditable="true" class="text-sm">Team notes...</div></div>
                </div>
            </div>

            <div id="tab-medical" class="main-tab hidden pdf-card min-h-[400px]">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 border-b pb-2">Treatment Log</h3>
                <div contenteditable="true" class="text-sm italic">Provider details...</div>
            </div>

        </div>
    </main>

    <script>
        // MAIN TAB LOGIC
        function showMainTab(id) {
            document.querySelectorAll('.main-tab').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            
            const target = document.getElementById('tab-' + id);
            target.classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        // SUB TAB LOGIC
        function showSubTab(id) {
            document.querySelectorAll('.sub-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.sub-tab-btn').forEach(b => {
                b.classList.remove('sub-active');
                b.classList.add('bg-white');
            });
            
            document.getElementById('sub-' + id).classList.remove('hidden');
            document.getElementById('sub-btn-' + id).classList.add('sub-active');
            document.getElementById('sub-btn-' + id).classList.remove('bg-white');
        }

        // PDF GENERATION
        async function generatePDF() {
            const area = document.getElementById('capture-area');
            // Show all hidden elements for capture
            document.querySelectorAll('.main-tab, .sub-pane').forEach(el => el.classList.remove('hidden'));
            
            await html2pdf().set({
                margin: 0.5,
                filename: 'LSH_Case.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).from(area).save();
            
            location.reload(); // Refresh to restore UI
        }

        // Visual Feedback
        document.addEventListener('input', () => {
            const s = document.getElementById('save-status');
            s.style.opacity = '1';
            setTimeout(() => s.style.opacity = '0', 800);
        });
    </script>
</body>
</html>
