<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; } 
        .tab-btn { border-bottom: 3px solid transparent; cursor: pointer; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 13px; padding-bottom: 8px; transition: 0.3s; }
        .active-tab { border-bottom: 3px solid #f97316 !important; color: #f97316 !important; }
        .pdf-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        [contenteditable="true"] { outline: none; border: 1px solid #f1f5f9; background: #f8fafc; border-radius: 4px; padding: 4px 8px; min-width: 40px; }
        [contenteditable="true"]:focus { background: #ffffff; border-color: #f97316; }
        label { font-size: 11px; margin-bottom: 4px; display: block; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        #pane-profile.active { display: grid; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 flex h-screen">

    <aside class="w-72 bg-slate-950 text-white flex flex-col no-print shrink-0">
        <div class="p-8 border-b border-slate-900">
            <h1 class="text-lg font-black uppercase tracking-tight">Legal Support Help</h1>
        </div>
        <div class="p-6 space-y-4">
            <button onclick="downloadPDF()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg font-bold text-xs uppercase">Download PDF</button>
            <button onclick="location.reload()" class="w-full border border-slate-700 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase">Reset Interface</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-8" id="capture-area">
            
            <div class="pdf-card border-l-8 border-orange-500">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-3xl font-black text-slate-900 uppercase">
                            <span contenteditable="true">Client Name</span>
                        </h1>
                        <p class="text-sm font-bold text-orange-600 mt-2 uppercase">Case ID: <span contenteditable="true">NEW-CASE-001</span></p>
                    </div>
                    <div class="text-right">
                        <div id="display-phase" class="text-orange-600 font-black text-2xl uppercase italic">Intake</div>
                    </div>
                </div>
            </div>

            <div id="tab-navigation" class="flex flex-wrap gap-8 border-b mb-6 no-print">
                <div id="btn-profile" onclick="showTab('profile')" class="tab-btn active-tab">Profile</div>
                <div id="btn-matrix" onclick="showTab('matrix')" class="tab-btn">Insurance</div>
                <div id="btn-pd" onclick="showTab('pd')" class="tab-btn">Property Damage</div>
            </div>

            <div id="pane-profile" class="tab-pane active grid-cols-2 gap-6">
                <div class="pdf-card">
                    <label>Address</label>
                    <div contenteditable="true" class="w-full text-base font-semibold">Street, City, State</div>
                </div>
                <div class="pdf-card">
                    <label>Accident Description</label>
                    <div contenteditable="true" class="w-full text-sm min-h-[100px]">Describe the incident here...</div>
                </div>
            </div>

            <div id="pane-matrix" class="tab-pane">
                <div class="pdf-card border-t-4 border-orange-500">
                    <h3 class="font-bold text-orange-600 uppercase text-xs mb-4">Carrier Details</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Policy #</label><div contenteditable="true">00000000</div></div>
                        <div><label>Claim #</label><div contenteditable="true">00000000</div></div>
                    </div>
                </div>
            </div>

            <div id="pane-pd" class="tab-pane">
                <div class="pdf-card border-l-8 border-orange-500">
                    <h3 class="font-bold text-orange-600 uppercase text-xs mb-4">Vehicle Status</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div><label>Year/Make/Model</label><div contenteditable="true">2024 Toyota Camy</div></div>
                        <div><label>Deductible</label><div contenteditable="true">$500.00</div></div>
                        <div><label>Estimate</label><div contenteditable="true">$0.00</div></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // CORE NAVIGATION LOGIC
        function showTab(id) {
            // 1. Hide all panes
            const panes = document.getElementsByClassName('tab-pane');
            for (let pane of panes) {
                pane.classList.remove('active');
            }
            
            // 2. Deactivate all buttons
            const btns = document.getElementsByClassName('tab-btn');
            for (let btn of btns) {
                btn.classList.remove('active-tab');
            }
            
            // 3. Activate selected
            const targetPane = document.getElementById('pane-' + id);
            const targetBtn = document.getElementById('btn-' + id);
            
            if (targetPane) targetPane.classList.add('active');
            if (targetBtn) targetBtn.classList.add('active-tab');
        }

        // PDF GENERATION LOGIC
        async function downloadPDF() {
            const area = document.getElementById('capture-area');
            const nav = document.getElementById('tab-navigation');
            const panes = document.querySelectorAll('.tab-pane');
            
            // Temporary styling to "unhide" everything for the PDF capture
            nav.style.display = 'none';
            panes.forEach(p => {
                p.style.display = 'block';
                p.style.marginBottom = '40px';
            });

            const opt = {
                margin: 0.5,
                filename: 'LSH_Training_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(area).save();
            } catch (err) {
                console.error("PDF Error:", err);
            } finally {
                // Restore UI back to normal
                nav.style.display = 'flex';
                panes.forEach(p => p.style.display = '');
                showTab('profile'); // Reset to home tab
            }
        }
    </script>
</body>
</html>
