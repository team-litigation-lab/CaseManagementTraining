<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 16px; } 
        .tab-btn { border-bottom: 3px solid transparent; cursor: pointer; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 11px; padding-bottom: 8px; transition: all 0.3s; white-space: nowrap; }
        .active-tab { border-bottom: 3px solid #f97316 !important; color: #f97316 !important; }
        .pdf-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        
        [contenteditable="true"] { 
            outline: none; border: 1px solid #f1f5f9; background: #f8fafc; border-radius: 4px; padding: 4px 8px; min-width: 40px; display: inline-block; 
            font-size: 12px !important; font-weight: 700 !important;
        }
        [contenteditable="true"]:focus { background: #ffffff; border-color: #f97316; }
        label { font-size: 11px !important; margin-bottom: 4px; display: block; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
        
        .ins-tab-header { background: #fff7ed; border-left: 4px solid #f97316; padding: 8px 12px; border-radius: 4px 4px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .ins-tab-content { border: 1px solid #fed7aa; border-top: none; padding: 16px; border-radius: 0 0 8px 8px; background: #ffffff; margin-bottom: 1.5rem; }
        select.prof-input { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 4px; padding: 4px 8px; font-size: 14px; font-weight: 600; outline: none; }
        
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .treat-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .treat-table th { background: #f8fafc; text-align: left; font-size: 10px; text-transform: uppercase; color: #64748b; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        .treat-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
