<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Assessment Portal</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6ndzR13/image-54df40.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 3px solid #F97316; color: #F97316; font-weight: 700; background-color: #fff; }
        .workspace-bg { background-color: #F3F4F6; }
        [contenteditable="true"]:focus { outline: 2px solid #F97316; background-color: #FFF7ED; padding: 4px; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Ensures the PDF/Print looks clean */
        @media print { 
            .no-print { display: none !important; } 
            .tab-content { display: block !important; opacity: 1 !important; visibility: visible !important; }
            .workspace-bg { background-color: white !important; }
            main { overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-white min-h-screen flex text-gray-800" onload="loadWork()">

    <aside class="w-64 bg-slate-800 text-white flex-shrink-0 hidden md:flex flex-col no-print">
        <div class="p-8 border-b border-slate-700 flex flex-col items-center justify-center">
            <h1 class="text-xl font-extrabold tracking-tighter leading-none text-center">
                <span class="block text-white">LEGAL</span>
                <span class="block text-orange-500">SUPPORT</span>
                <span class="block text-white">HELP</span>
            </h1>
        </div>
        <nav class="mt-6 px-4 space-y-1 flex-1">
            <button onclick="saveCase()" class="w-full mt-8 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg text-xs font-bold uppercase shadow-xl transition-all">Download PDF</button>
            <button onclick="resetForm()" class="w-full mt-4 border border-slate-600 hover:bg-slate-700 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Clear Progress</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden workspace-bg">
        <header class="h-16 bg-slate-900 border-b border-gray-200 relative no-print flex items-center px-8">
            <div id="save-status" class="ml-auto text-[8px] text-white/50 uppercase font-bold tracking-widest opacity-0 transition-opacity">Progress Recorded</div>
        </header>

        <div class="p-6 overflow-y-auto flex-1" id="capture-area" oninput="autoSave()">
            
            <div class="mb-6 border-b pb-6 bg-white p-4 rounded-lg shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                            <span contenteditable="true" class="border-b-2 border-dashed border-slate-300">Client's Name</span>
                            <span class="text-slate-400 font-light">-</span>
                            <span contenteditable="true" class="border-b-2 border-dashed border-slate-300">Trainee's Name</span>
                        </h1>
                        <div class="mt-3 flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Case File ID:</span>
                            <span contenteditable="true" class="text-sm font-mono font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded border border-orange-100">(Batch Code)</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <select onchange="updatePhase(this.value)" class="no-print bg-white border border-slate-300 rounded px-2 py-1 text-[10px] font-bold uppercase outline-none shadow-sm">
                            <option value="Intake">Intake Phase</option>
                            <option value="Investigation">Investigation</option>
                            <option value="No Contact">No Contact</option>
                            <option value="Demand Review">Demand Review</option>
                            <option value="Demand">Demand</option>
                            <option value="BI Settlement">BI Settlement</option>
                            <option value="UM Settlement">UM Settlement</option>
                            <option value="Lien Negotiations">Lien Negotiations</option>
                            <option value="Closed">Closed</option>
                        </select>
                        <div id="currentStatus" class="mt-2 text-orange-600 font-black text-xl uppercase italic">Intake</div>
                    </div>
                </div>
            </div>

            <div class="flex border-b mb-6 bg-white rounded-t-xl overflow-x-auto scrollbar-hide shadow-sm no-print">
                <button onclick="showTab('client')" id="btn-client" class="tab-btn px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400 tab-active">Client Profile</button>
                <button onclick="showTab('facts')" id="btn-facts" class="tab-btn px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Case Facts</button>
                <button onclick="showTab('medical')" id="btn-medical" class="tab-btn px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Medical</button>
                <button onclick="showTab('insurance')" id="btn-insurance" class="tab-btn px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Insurance</button>
            </div>

            <div id="tab-client" class="tab-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-lg border shadow-sm border-t-4 border-slate-600">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-600 mb-4">Contact Information</h3>
                        <div class="space-y-4">
                            <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Phone Number</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                            <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Email Address</label><div contenteditable="true" class="text-sm p-1 text-blue-600">...</div></div>
                            <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Mailing Address</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-lg border shadow-sm border-t-4 border-indigo-500">
                        <h3 class="text-xs font-black uppercase tracking-widest text-indigo-600 mb-4">Alternative Contact Info</h3>
                        <div class="space-y-4">
                            <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Alt. Phone</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                            <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Relationship</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-facts" class="tab-content hidden space-y-6">
                <div class="bg-white p-6 rounded-lg border shadow-sm border-t-4 border-slate-600">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-600">Incident Details</h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Date of Loss</label><div contenteditable="true" class="text-sm p-1 font-bold">...</div></div>
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Location</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Police Dept.</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                    </div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Accident Narrative</label>
                    <div contenteditable="true" class="text-sm min-h-[150px] bg-slate-50 p-4 rounded italic border mt-1">Provide description here...</div>
                </div>
            </div>

            <div id="tab-medical" class="tab-content hidden space-y-6">
                <div class="bg-white p-6 rounded-lg border shadow-sm border-t-4 border-red-500">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-black uppercase tracking-widest text-red-600">Injuries Sustained</h3>
                        <button onclick="addListRow('injury-list')" class="no-print text-[9px] bg-red-100 text-red-600 font-bold px-3 py-1 rounded">Add +</button>
                    </div>
                    <div id="injury-list" class="space-y-2">
                        <div class="flex items-center space-x-2"><span class="text-[10px] text-slate-300 font-bold">1.</span><div contenteditable="true" class="flex-1 text-sm border-b italic border-gray-200">...</div></div>
                    </div>
                </div>
            </div>

            <div id="tab-insurance" class="tab-content hidden space-y-6">
                <div class="bg-white p-6 rounded-lg border shadow-sm border-t-4 border-blue-600">
                    <h3 class="text-xs font-black uppercase tracking-widest text-blue-600 mb-4">Auto Insurance / PIP</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Carrier</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Policy #</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                        <div class="border-b"><label class="text-[10px] font-bold text-slate-400 uppercase">Limits</label><div contenteditable="true" class="text-sm p-1">...</div></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function showTab(tabId) {
            // Hide all tabs using Tailwind 'hidden' class
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
            });
            
            // Show the selected tab
            const activeTab = document.getElementById('tab-' + tabId);
            if(activeTab) {
                activeTab.classList.remove('hidden');
            }
            
            // Update button styles
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        function addListRow(containerId) {
            const container = document.getElementById(containerId);
            const count = container.children.length + 1;
            const div = document.createElement('div');
            div.className = "flex items-center space-x-2";
            div.innerHTML = `<span class="text-[10px] text-slate-300 font-bold">${count}.</span><div contenteditable="true" class="flex-1 text-sm border-b italic border-gray-200">...</div>`;
            container.appendChild(div);
        }

        function updatePhase(val) {
            document.getElementById('currentStatus').innerText = val;
        }

        function autoSave() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 1200);
        }

        function loadWork() {
            showTab('client');
        }

        function resetForm() {
            if(confirm("This will clear all your progress. Continue?")) {
                location.reload();
            }
        }

        async function saveCase() {
            const area = document.getElementById('capture-area');
            const tabs = document.querySelectorAll('.tab-content');
            
            // 1. Temporarily show all tabs for PDF capture
            tabs.forEach(t => t.classList.remove('hidden'));

            const opt = {
                margin: 0.5,
                filename: 'LSH_Assessment_File.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // 2. Generate PDF
            try {
                await html2pdf().from(area).set(opt).save();
            } catch (err) {
                console.error("PDF Export Error:", err);
            } finally {
                // 3. Reset UI back to tabbed view
                const activeBtnId = document.querySelector('.tab-active').id.replace('btn-', '');
                showTab(activeBtnId);
            }
        }
    </script>
</body>
</html>
