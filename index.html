<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSH | Training Interface</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6ndzR13/image-54df40.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .tab-active { 
            border-bottom: 3px solid #F97316; 
            color: #F97316 !important; 
            font-weight: 800; 
            background-color: #fff; 
        }
        .workspace-bg { background-color: #F8FAFC; }
        
        @media print {
            .no-print { display: none !important; }
            body, .workspace-bg { background-color: white !important; }
            .tab-content { 
                display: block !important; 
                opacity: 1 !important; 
                visibility: visible !important;
                page-break-inside: avoid;
                margin-bottom: 1.5rem;
                border: 1px solid #E2E8F0 !important;
                padding: 1.5rem !important;
                border-radius: 0.5rem;
            }
            #capture-area { padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-white min-h-screen flex text-gray-800" onload="loadWork()">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col no-print">
        <div class="p-8 border-b border-slate-800 flex flex-col items-center">
            <h1 class="text-xl font-extrabold tracking-tighter text-center">
                <span class="block text-slate-400 text-xs tracking-[0.3em] mb-1">INTERFACE</span>
                <span class="block">LEGAL</span>
                <span class="block text-orange-500">SUPPORT</span>
                <span class="block">HELP</span>
            </h1>
        </div>
        <nav class="mt-10 px-6 space-y-4 flex-1">
            <button onclick="saveCase()" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-lg text-xs font-bold uppercase tracking-widest shadow-lg transition-all active:scale-95">
                Download PDF
            </button>
            <button onclick="resetForm()" class="w-full border border-slate-700 hover:bg-slate-800 text-slate-400 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">
                Clear Interface
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden workspace-bg">
        <header class="h-12 bg-white border-b border-gray-200 no-print flex items-center justify-end px-8">
            <div id="save-status" class="text-[9px] text-slate-400 uppercase font-bold tracking-widest opacity-0 transition-opacity">
                Interface Synced
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-1" id="capture-area" oninput="autoSave()">
            
            <div class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                    <div class="flex-1">
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight flex flex-wrap items-center gap-3">
                            <span contenteditable="true" class="hover:bg-slate-50 px-1 rounded transition-colors">Client Name</span>
                            <span class="text-slate-300 font-thin">/</span>
                            <span contenteditable="true" class="text-slate-600 hover:bg-slate-50 px-1 rounded transition-colors">Trainee Name</span>
                        </h1>
                        <div class="mt-4 flex items-center gap-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Training Interface ID</span>
                            <span contenteditable="true" class="text-xs font-mono font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full border border-orange-100">BATCH-2026</span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <select onchange="updatePhase(this.value)" class="no-print mb-2 bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 text-[10px] font-bold uppercase text-slate-600 outline-none">
                            <option value="Intake">Intake</option>
                            <option value="Investigation">Investigation</option>
                            <option value="Demand">Demand</option>
                            <option value="Settled">Settled</option>
                        </select>
                        <div id="currentStatus" class="text-orange-600 font-black text-2xl uppercase italic tracking-tighter">Intake</div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center md:justify-start gap-1 mb-8 no-print border-b border-slate-200">
                <button onclick="showTab('client')" id="btn-client" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all tab-active">Client Profile</button>
                <button onclick="showTab('facts')" id="btn-facts" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Case Facts</button>
                <button onclick="showTab('medical')" id="btn-medical" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Medical</button>
                <button onclick="showTab('insurance')" id="btn-insurance" class="tab-btn px-6 py-3 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-all">Insurance</button>
            </div>

            <div id="tab-client" class="tab-content grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Client Contact</h3>
                    <div class="space-y-5">
                        <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Phone</label><div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">...</div></div>
                        <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Email</label><div contenteditable="true" class="text-sm py-1 font-semibold text-blue-600 underline">...</div></div>
                        <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Address</label><div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">...</div></div>
                    </div>
                </div>
            </div>

            <div id="tab-facts" class="tab-content hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Incident Narrative</h3>
                    <div contenteditable="true" class="text-sm leading-relaxed text-slate-700 min-h-[300px] outline-none">
                        Provide the narrative for the training exercise...
                    </div>
                </div>
            </div>

            <div id="tab-medical" class="tab-content hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Injuries & Treatment</h3>
                    <div contenteditable="true" class="text-sm leading-relaxed text-slate-700 min-h-[200px] outline-none italic text-slate-400">
                        List medical details...
                    </div>
                </div>
            </div>

            <div id="tab-insurance" class="tab-content hidden">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Coverage Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="border-b"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Carrier</label><div contenteditable="true" class="text-sm py-2">...</div></div>
                        <div class="border-b"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Policy #</label><div contenteditable="true" class="text-sm py-2">...</div></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('tab-' + tabId);
            if(target) target.classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        function updatePhase(val) {
            document.getElementById('currentStatus').innerText = val;
        }

        function autoSave() {
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 800);
        }

        async function saveCase() {
            const element = document.getElementById('capture-area');
            const allTabs = document.querySelectorAll('.tab-content');
            allTabs.forEach(t => t.classList.remove('hidden'));
            
            const opt = {
                margin: 0.5,
                filename: 'LSH_Training_Interface_Report.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } finally {
                const currentTabId = document.querySelector('.tab-active').id.replace('btn-', '');
                showTab(currentTabId);
            }
        }

        function resetForm() {
            if(confirm("Clear current training interface data?")) location.reload();
        }

        function loadWork() {
            showTab('client');
        }
    </script>
</body>
</html>
