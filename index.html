<div id="tab-client" class="tab-content grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm content-card">
        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Client Contact</h3>
        <div class="space-y-5">
            <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Phone</label><div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">...</div></div>
            <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Email</label><div contenteditable="true" class="text-sm py-1 font-semibold text-blue-600 underline">...</div></div>
            <div class="group"><label class="text-[9px] font-extrabold text-slate-400 uppercase">Address</label><div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">...</div></div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm content-card">
        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 border-b pb-2">Personal Identification</h3>
        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="group">
                    <label class="text-[9px] font-extrabold text-slate-400 uppercase">Date of Birth</label>
                    <div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">MM/DD/YYYY</div>
                </div>
                <div class="group">
                    <label class="text-[9px] font-extrabold text-slate-400 uppercase">SSN</label>
                    <div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">XXX-XX-XXXX</div>
                </div>
            </div>
            <div class="group">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase">DL Number / State</label>
                <div contenteditable="true" class="text-sm py-1 font-semibold text-slate-700">...</div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-dashed border-slate-200">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase block mb-2">Identification Document</label>
                <div class="flex items-center gap-3">
                    <input type="file" id="id-upload" class="hidden" onchange="handleFileUpload(this)">
                    <button onclick="document.getElementById('id-upload').click()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-bold py-2 px-4 rounded transition-all">
                        Upload ID Copy
                    </button>
                    <span id="file-ready" class="text-[10px] font-medium text-slate-500 italic">No file selected</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function handleFileUpload(input) {
        const display = document.getElementById('file-ready');
        if (input.files && input.files[0]) {
            display.innerText = "Attached: " + input.files[0].name;
            display.classList.remove('text-slate-500');
            display.classList.add('text-green-600', 'not-italic', 'font-bold');
            autoSave(); // Trigger the save status indicator
        } else {
            display.innerText = "No file selected";
        }
    }

    // ... (rest of your existing functions)
</script>
