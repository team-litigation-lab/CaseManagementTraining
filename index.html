<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Support | Editable Case Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-custom-orange { background-color: #F97316; }
        .text-custom-orange { color: #F97316; }
        .hover-orange:hover { background-color: #EA580C; }
        [contenteditable="true"]:focus { 
            outline: 2px solid #F97316; 
            background-color: #FFF7ED;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex text-gray-800">

    <aside class="w-64 bg-slate-800 text-white flex-shrink-0 hidden md:block">
        <div class="p-6 text-xl font-bold border-b border-slate-700 text-orange-400">LEGAL SUPPORT</div>
        <nav class="mt-6 px-4 space-y-1">
            <div class="py-2.5 px-4 rounded bg-slate-700 border-l-4 border-custom-orange text-sm cursor-pointer">Active Intake</div>
            <div class="py-2.5 px-4 rounded hover:bg-slate-700 text-gray-400 text-sm cursor-pointer">Archive</div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center shadow-sm">
            <h2 class="text-sm font-bold text-slate-600 uppercase tracking-widest">Case Management System</h2>
            <div class="flex items-center space-x-2">
                <span class="text-[10px] font-bold text-orange-600 bg-orange-50 px-2 py-1 border border-orange-200 rounded">EDIT MODE ENABLED</span>
            </div>
        </header>

        <div class="p-6 overflow-y-auto space-y-6 bg-gray-50 flex-1">
            
            <div class="bg-white rounded-lg shadow-md border border-gray-200">
                <div class="p-4 border-b border-gray-100 bg-slate-800 rounded-t-lg font-bold text-white">Intake Entry</div>
                <form id="intakeForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase">Client Name</label>
                        <input type="text" id="clientName" class="w-full mt-1 p-2 border rounded border-gray-300 focus:ring-2 focus:ring-orange-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase">DOL</label>
                        <input type="date" id="dol" class="w-full mt-1 p-2 border rounded border-gray-300 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <button type="submit" class="bg-custom-orange text-white px-8 py-2 rounded font-bold hover-orange uppercase text-sm">Create Editable Case</button>
                    </div>
                </form>
            </div>

            <div id="editableDashboard" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-custom-orange">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-xl font-bold text-slate-800">Case Profile: <span id="displayClient" class="text-orange-600"></span></h3>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">Click any text with the orange focus to edit data live</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="p-3 border rounded">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Verified Name</label>
                            <div id="editName" contenteditable="true" class="font-semibold text-slate-700">Client Name</div>
                        </div>
                        <div class="p-3 border rounded">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Statute (SOL)</label>
                            <div id="editSol" contenteditable="true" class="font-semibold text-red-600">MM/DD/YYYY</div>
                        </div>
                        <div class="p-3 border rounded">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Address (Cavite)</label>
                            <div id="editAddr" contenteditable="true" class="font-semibold text-slate-700 text-sm">Add Address...</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md border border-gray-200">
                    <div class="p-4 bg-slate-800 text-white font-bold flex justify-between">
                        <span>Document Repository</span>
                        <button onclick="addDocument()" class="text-orange-400 hover:text-orange-300 text-xs">+ Add Document</button>
                    </div>
                    <div class="p-0 overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 text-slate-500 border-b">
                                <tr>
                                    <th class="p-4 text-left font-bold uppercase text-[10px]">File Naming (Editable)</th>
                                    <th class="p-4 text-left font-bold uppercase text-[10px]">Hyperlink Source</th>
                                    <th class="p-4 text-center font-bold uppercase text-[10px]">Action</th>
                                </tr>
                            </thead>
                            <tbody id="docTableBody" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('intakeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('clientName').value;
            const dol = document.getElementById('dol').value;
            
            document.getElementById('displayClient').innerText = name;
            document.getElementById('editName').innerText = name;
            document.getElementById('editSol').innerText = dol ? "Update based on DOL" : "Enter SOL Date";
            
            document.getElementById('editableDashboard').classList.remove('hidden');
            this.parentElement.classList.add('hidden'); // Hide the intake form
        });

        function addDocument() {
            const table = document.getElementById('docTableBody');
            const rowId = 'row-' + Date.now();
            const row = `
                <tr id="${rowId}" class="hover:bg-orange-50 transition">
                    <td class="p-4 font-mono text-xs text-orange-700 font-bold" contenteditable="true">YYYYMMDD_SURNAME_TYPE</td>
                    <td class="p-4 text-slate-500 text-xs" contenteditable="true">https://document-link.com</td>
                    <td class="p-4 text-center">
                        <button onclick="document.getElementById('${rowId}').remove()" class="text-red-400 hover:text-red-600 text-[10px] font-bold uppercase">Delete</button>
                    </td>
                </tr>
            `;
            table.insertAdjacentHTML('afterbegin', row);
        }
    </script>
</body>
</html>
